apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-server-pdb
  namespace: platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api-server
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: auth-server-pdb
  namespace: platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: auth-server
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: frontend
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: frontend
