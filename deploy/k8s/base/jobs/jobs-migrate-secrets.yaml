# Substitute PROJECT_ID the same way as deploy/k8s/base/infra/external-secrets.yaml (e.g. claims-manager-staging).
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: gcp-secret-store
  namespace: jobs
spec:
  provider:
    gcpsm:
      projectID: PROJECT_ID
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: api-server-secrets
  namespace: jobs
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: SecretStore
  target:
    name: api-server-secrets
    creationPolicy: Owner
  data:
    - secretKey: database-url
      remoteRef:
        key: database-url-api
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: auth-server-secrets
  namespace: jobs
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: SecretStore
  target:
    name: auth-server-secrets
    creationPolicy: Owner
  data:
    - secretKey: database-url
      remoteRef:
        key: database-url-auth
