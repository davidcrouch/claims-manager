# More0AI Shared Infrastructure
#
# Provides shared services: pgsql, redis, minio, nats, mailpit, otel-collector, tempo, loki, prometheus, grafana.
# Start this before starting individual application compose files.
#
# Usage:
#   cd infra
#   docker compose up -d
#
# Then start applications:
#   cd ../
#   docker compose up -d

name: claim-manager-infra

services:
  # ============================================================================
  # DATABASE
  # ============================================================================
  pgsql:
    image: 'pgvector/pgvector:pg17'
    container_name: pgsql
    ports:
      - '${DB_PORT:-3210}:5432'
    environment:
      PGPASSWORD: '${DB_PASSWORD:-password}'
      POSTGRES_DB: '${DB_DATABASE:-more0ai}'
      POSTGRES_USER: '${DB_USERNAME:-more0ai}'
      POSTGRES_PASSWORD: '${DB_PASSWORD:-password}'
    volumes:
      - 'pgsql-data:/var/lib/postgresql/data'
      - './init-scripts/databases:/docker-entrypoint-initdb.d'
    networks:
      - claim-manager-infra
    command:
      - "postgres"
      - "-c"
      - "max_locks_per_transaction=256"
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "${DB_DATABASE:-claim-manager}", "-U", "${DB_USERNAME:-more0ai}"]
      interval: 10s
      retries: 3
      timeout: 5s
    restart: unless-stopped

  # ============================================================================
  # MESSAGING (NATS)
  # ============================================================================
  nats:
    image: nats:2.10-alpine
    container_name: nats
    command: ["-c", "/etc/nats/nats.conf"]
    volumes:
      - ../nats.conf:/etc/nats/nats.conf:ro
    ports:
      - "${PORT_NATS:-3220}:4222"
      - "${PORT_NATS_MONITOR:-3221}:8222"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/varz"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - claim-manager-infra
    restart: unless-stopped

  # ============================================================================
  # CACHE / QUEUE
  # ============================================================================
  redis:
    image: 'redis:alpine'
    container_name: redis
    ports:
      - '${PORT_REDIS:-3250}:6379'
    volumes:
      - 'redis-data:/data'
    networks:
      - claim-manager-infra
    command: redis-server --maxmemory 3gb --maxmemory-policy allkeys-lru
    mem_limit: 5g
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 3
      timeout: 5s
    restart: unless-stopped

  # ============================================================================
  # OBJECT STORAGE
  # ============================================================================
  minio:
    image: 'minio/minio:latest'
    container_name: minio
    ports:
      - '${PORT_MINIO:-3230}:9000'
      - '${PORT_MINIO_CONSOLE:-3231}:8900'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-more0ai}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password}
    volumes:
      - 'minio-data:/data'
    networks:
      - claim-manager-infra
    command: 'minio server /data --console-address ":8900"'
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      retries: 3
      timeout: 5s
    restart: unless-stopped

  # MinIO bucket initialization
  minio-init:
    image: 'minio/mc:latest'
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-more0ai}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password}
    networks:
      - claim-manager-infra
    volumes:
      - './minio-cors.json:/tmp/cors.json:ro'
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing minio/workers-comp;
      mc mb --ignore-existing minio/pdf-test-generation;
      mc mb --ignore-existing minio/more0ai-shared;
      mc mb --ignore-existing minio/chat-attachments;
      mc anonymous set download minio/workers-comp;
      mc anonymous set download minio/pdf-test-generation;
      mc anonymous set download minio/chat-attachments;
      mc cors set minio/workers-comp /tmp/cors.json;
      mc cors set minio/pdf-test-generation /tmp/cors.json;
      mc cors set minio/more0ai-shared /tmp/cors.json;
      echo 'MinIO buckets created and configured';
      "

  # ============================================================================
  # EMAIL (Development)
  # ============================================================================
  mailpit:
    image: 'axllent/mailpit:latest'
    container_name: mailpit
    ports:
      - '${PORT_SMTP:-3240}:1025'
      - '${PORT_MAIL_UI:-3241}:8025'
    networks:
      - more0ai-infra
    restart: unless-stopped

  # ============================================================================
  # OBSERVABILITY - OpenTelemetry Collector
  # ============================================================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ../ops/observability/otel-collector/config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "${PORT_OTEL_GRPC:-3270}:4317"     # OTLP gRPC receiver
      - "${PORT_OTEL_HTTP:-3271}:4318"      # OTLP HTTP receiver
      - "${PORT_OTEL_METRICS:-3272}:8889"   # Prometheus metrics endpoint
    networks:
      - more0ai-infra
#    depends_on:
#      - tempo
#      - loki
#      - prometheus
    restart: unless-stopped

