apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

  # Minimum pod requests for Autopilot billing (staging only).
  - target:
      kind: Deployment
      name: api-server
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
  - target:
      kind: Deployment
      name: auth-server
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
  - target:
      kind: Deployment
      name: frontend
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m

  - target:
      kind: ConfigMap
      name: otel-collector-config
    patch: |
      - op: replace
        path: /data/config.yaml
        value: |
          extensions:
            health_check:
              endpoint: 0.0.0.0:13133
          exporters:
            logging:
              loglevel: warn
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318
          processors:
            batch:
              timeout: 5s
              send_batch_size: 256
          service:
            extensions: [health_check]
            pipelines:
              traces:
                receivers: [otlp]
                processors: [batch]
                exporters: [logging]
              metrics:
                receivers: [otlp]
                processors: [batch]
                exporters: [logging]
