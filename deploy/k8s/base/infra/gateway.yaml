apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: claims-manager-gateway
  namespace: gateways
  annotations:
    networking.gke.io/certmap: claims-manager-cert-map
spec:
  gatewayClassName: gke-l7-global-external-managed
  listeners:
    - name: https
      port: 443
      protocol: HTTPS
      allowedRoutes:
        namespaces:
          from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app
  namespace: frontend
spec:
  parentRefs:
    - name: claims-manager-gateway
      namespace: gateways
      sectionName: https
  hostnames:
    - app.DNS_SUFFIX
  rules:
    - backendRefs:
        - name: frontend
          port: 3000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: auth
  namespace: platform
spec:
  parentRefs:
    - name: claims-manager-gateway
      namespace: gateways
      sectionName: https
  hostnames:
    - auth.DNS_SUFFIX
  rules:
    - backendRefs:
        - name: auth-server
          port: 4000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api
  namespace: platform
spec:
  parentRefs:
    - name: claims-manager-gateway
      namespace: gateways
      sectionName: https
  hostnames:
    - api.DNS_SUFFIX
  rules:
    - backendRefs:
        - name: api-server
          port: 3001
