    tty: true
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - more0ai-infra
    image: registry.fly.io/morezero-auth-server

networks:
  more0ai-infra:
    external: true
    name: more0ai-infra

