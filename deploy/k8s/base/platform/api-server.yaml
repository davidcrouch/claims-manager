apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-server
  namespace: platform
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: platform
  labels:
    app: api-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      serviceAccountName: api-server
      containers:
        - name: api-server
          image: australia-southeast1-docker.pkg.dev/claims-manager-infra/claims-manager/api-server:IMAGE_TAG
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: api-server-secrets
                  key: database-url
            - name: CREDENTIALS_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: api-server-secrets
                  key: credentials-encryption-key
            - name: AUTH_ISSUER_URL
              value: https://auth.DNS_SUFFIX
            - name: AUTH_JWKS_URI
              value: https://auth.DNS_SUFFIX/jwks
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.infra.svc.cluster.local:4317
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api-server
  namespace: platform
  labels:
    app: api-server
spec:
  selector:
    app: api-server
  ports:
    - port: 3001
      targetPort: 3001
