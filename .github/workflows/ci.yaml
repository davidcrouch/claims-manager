name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_build_all:
        description: "Build and push ALL Docker images (skip path filters)"
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm --filter api test

  docker-build:
    runs-on: ubuntu-latest
    needs: [node-ci]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          docker system prune -af
          df -h /

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api-server:
              - 'apps/api/**'
              - 'packages/**'
            auth-server:
              - 'apps/auth-server/**'
              - 'packages/telemetry/**'
            frontend:
              - 'apps/frontend/**'

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ci-deployer@claims-manager-infra-493807.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker australia-southeast1-docker.pkg.dev

      - name: Set image tag
        run: echo "IMAGE_TAG=main-${GITHUB_SHA::7}" >> $GITHUB_ENV

      # First-build bootstrap: if :latest doesn't exist for a service yet,
      # the later re-tag step can't clone it to the commit tag. Detect
      # missing images here so the build step below can force them.
      - id: existing
        name: Detect existing images
        run: |
          REGISTRY="australia-southeast1-docker.pkg.dev/claims-manager-infra-493807/claims-manager"
          check() {
            local image=$1
            if gcloud artifacts docker images describe "${REGISTRY}/${image}:latest" > /dev/null 2>&1; then
              echo "${image}: latest exists"
              echo "${image}=true" >> $GITHUB_OUTPUT
            else
              echo "${image}: latest missing (will force build)"
              echo "${image}=false" >> $GITHUB_OUTPUT
            fi
          }
          check api-server
          check auth-server
          check frontend

      - name: Build & push api-server
        if: steps.changes.outputs.api-server == 'true' || inputs.force_build_all || steps.existing.outputs.api-server == 'false'
        run: |
          docker build -f apps/api/Dockerfile \
            -t australia-southeast1-docker.pkg.dev/claims-manager-infra-493807/claims-manager/api-server:${{ env.IMAGE_TAG }} \
            -t australia-southeast1-docker.pkg.dev/claims-manager-infra-493807/claims-manager/api-server:latest \
            .
          docker push --all-tags australia-southeast1-docker.pkg.dev/claims-manager-infra-493807/claims-manager/api-server
          docker system prune -af

      - name: Build & push auth-server
        if: steps.changes.outputs.auth-server == 'true' || inputs.force_build_all || steps.existing.outputs.auth-server == 'false'
        run: |
          docker build -f apps/auth-server/Dockerfile \
            -t australia-southeast1-docker.pkg.dev/claims-manager-infra-493807/claims-manager/auth-server:${{ env.IMAGE_TAG }} \
            -t australia-southeast1-docker.pkg.dev/claims-manager-infra-493807/claims-manager/auth-server:latest \
            .
          docker push --all-tags australia-southeast1-docker.pkg.dev/claims-manager-infra-493807/claims-manager/auth-server
          docker system prune -af

      # Frontend is a BFF: every call to createApiClient runs on the
      # Next.js server (server components + `use server` actions), so
      # NEXT_PUBLIC_API_URL is read from process.env at runtime and does
      # NOT need to be baked in. compose.yaml sets it per-environment.
      - name: Build & push frontend
        if: steps.changes.outputs.frontend == 'true' || inputs.force_build_all || steps.existing.outputs.frontend == 'false'
        run: |
          docker build -f apps/frontend/Dockerfile \
            -t australia-southeast1-docker.pkg.dev/claims-manager-infra-493807/claims-manager/frontend:${{ env.IMAGE_TAG }} \
            -t australia-southeast1-docker.pkg.dev/claims-manager-infra-493807/claims-manager/frontend:latest \
            .
          docker push --all-tags australia-southeast1-docker.pkg.dev/claims-manager-infra-493807/claims-manager/frontend
          docker system prune -af

      - name: Re-tag unchanged images
        run: |
          REGISTRY="australia-southeast1-docker.pkg.dev/claims-manager-infra-493807/claims-manager"
          FAILED=0
          retag() {
            local image=$1
            echo "Re-tagging ${image}:latest → ${image}:${{ env.IMAGE_TAG }}"
            if ! gcloud artifacts docker tags add \
              "${REGISTRY}/${image}:latest" \
              "${REGISTRY}/${image}:${{ env.IMAGE_TAG }}" 2>&1; then
              echo "::error::Failed to re-tag ${image}:latest → ${{ env.IMAGE_TAG }}. Image may not exist in registry."
              FAILED=1
            fi
          }
          # Skip retag when the service was (re)built in this run — either
          # because code changed, force_build_all was set, or :latest was
          # missing and we just bootstrapped it.
          needs_retag() {
            local image=$1
            local changed=$2
            local existed=$3
            [ "$changed" != "true" ] \
              && [ "${{ inputs.force_build_all }}" != "true" ] \
              && [ "$existed" = "true" ]
          }
          needs_retag api-server  "${{ steps.changes.outputs.api-server }}"  "${{ steps.existing.outputs.api-server }}"  && retag api-server
          needs_retag auth-server "${{ steps.changes.outputs.auth-server }}" "${{ steps.existing.outputs.auth-server }}" && retag auth-server
          needs_retag frontend    "${{ steps.changes.outputs.frontend }}"    "${{ steps.existing.outputs.frontend }}"    && retag frontend
          if [ "$FAILED" -ne 0 ]; then
            echo "::error::One or more image re-tags failed. Run workflow_dispatch with force_build_all=true to rebuild all images."
            exit 1
          fi
          echo "All image tags ensured for ${{ env.IMAGE_TAG }}"

      - name: Verify all images exist
        run: |
          REGISTRY="australia-southeast1-docker.pkg.dev/claims-manager-infra-493807/claims-manager"
          MISSING=0
          for image in api-server auth-server frontend; do
            if ! gcloud artifacts docker images describe "${REGISTRY}/${image}:${{ env.IMAGE_TAG }}" > /dev/null 2>&1; then
              echo "::error::Image ${image}:${{ env.IMAGE_TAG }} not found in Artifact Registry"
              MISSING=1
            else
              echo "✓ ${image}:${{ env.IMAGE_TAG }}"
            fi
          done
          if [ "$MISSING" -ne 0 ]; then
            echo "::error::Missing images detected. Run workflow_dispatch with force_build_all=true."
            exit 1
          fi
