name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_build_all:
        description: "Build and push ALL Docker images (skip path filters)"
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm --filter api test

  docker-build:
    runs-on: ubuntu-latest
    needs: [node-ci]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          docker system prune -af
          df -h /

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api-server:
              - 'apps/api/**'
              - 'packages/**'
            auth-server:
              - 'apps/auth-server/**'
              - 'packages/logger/**'
              - 'packages/telemetry/**'
            frontend:
              - 'apps/frontend/**'

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ci-deployer@claims-manager-infra.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker australia-southeast1-docker.pkg.dev

      - name: Set image tag
        run: echo "IMAGE_TAG=main-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build & push api-server
        if: steps.changes.outputs.api-server == 'true' || inputs.force_build_all
        run: |
          docker build -f apps/api/Dockerfile \
            -t australia-southeast1-docker.pkg.dev/claims-manager-infra/claims-manager/api-server:${{ env.IMAGE_TAG }} \
            -t australia-southeast1-docker.pkg.dev/claims-manager-infra/claims-manager/api-server:latest \
            .
          docker push --all-tags australia-southeast1-docker.pkg.dev/claims-manager-infra/claims-manager/api-server
          docker system prune -af

      - name: Build & push auth-server
        if: steps.changes.outputs.auth-server == 'true' || inputs.force_build_all
        run: |
          docker build -f apps/auth-server/Dockerfile \
            -t australia-southeast1-docker.pkg.dev/claims-manager-infra/claims-manager/auth-server:${{ env.IMAGE_TAG }} \
            -t australia-southeast1-docker.pkg.dev/claims-manager-infra/claims-manager/auth-server:latest \
            .
          docker push --all-tags australia-southeast1-docker.pkg.dev/claims-manager-infra/claims-manager/auth-server
          docker system prune -af

      - name: Build & push frontend
        if: steps.changes.outputs.frontend == 'true' || inputs.force_build_all
        run: |
          docker build -f apps/frontend/Dockerfile \
            -t australia-southeast1-docker.pkg.dev/claims-manager-infra/claims-manager/frontend:${{ env.IMAGE_TAG }} \
            -t australia-southeast1-docker.pkg.dev/claims-manager-infra/claims-manager/frontend:latest \
            .
          docker push --all-tags australia-southeast1-docker.pkg.dev/claims-manager-infra/claims-manager/frontend
          docker system prune -af

      - name: Re-tag unchanged images
        run: |
          REGISTRY="australia-southeast1-docker.pkg.dev/claims-manager-infra/claims-manager"
          FAILED=0
          retag() {
            local image=$1
            echo "Re-tagging ${image}:latest → ${image}:${{ env.IMAGE_TAG }}"
            if ! gcloud artifacts docker tags add \
              "${REGISTRY}/${image}:latest" \
              "${REGISTRY}/${image}:${{ env.IMAGE_TAG }}" 2>&1; then
              echo "::error::Failed to re-tag ${image}:latest → ${{ env.IMAGE_TAG }}. Image may not exist in registry."
              FAILED=1
            fi
          }
          [ "${{ steps.changes.outputs.api-server }}" != "true" ] && retag api-server
          [ "${{ steps.changes.outputs.auth-server }}" != "true" ] && retag auth-server
          [ "${{ steps.changes.outputs.frontend }}" != "true" ] && retag frontend
          if [ "$FAILED" -ne 0 ]; then
            echo "::error::One or more image re-tags failed. Run workflow_dispatch with force_build_all=true to rebuild all images."
            exit 1
          fi
          echo "All image tags ensured for ${{ env.IMAGE_TAG }}"

      - name: Verify all images exist
        run: |
          REGISTRY="australia-southeast1-docker.pkg.dev/claims-manager-infra/claims-manager"
          MISSING=0
          for image in api-server auth-server frontend; do
            if ! gcloud artifacts docker images describe "${REGISTRY}/${image}:${{ env.IMAGE_TAG }}" > /dev/null 2>&1; then
              echo "::error::Image ${image}:${{ env.IMAGE_TAG }} not found in Artifact Registry"
              MISSING=1
            else
              echo "✓ ${image}:${{ env.IMAGE_TAG }}"
            fi
          done
          if [ "$MISSING" -ne 0 ]; then
            echo "::error::Missing images detected. Run workflow_dispatch with force_build_all=true."
            exit 1
          fi
