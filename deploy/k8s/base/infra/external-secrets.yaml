apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: gcp-secret-store
  namespace: platform
spec:
  provider:
    gcpsm:
      projectID: PROJECT_ID
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: gcp-secret-store
  namespace: frontend
spec:
  provider:
    gcpsm:
      projectID: PROJECT_ID
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: gcp-secret-store
  namespace: jobs
spec:
  provider:
    gcpsm:
      projectID: PROJECT_ID
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: api-server-secrets
  namespace: platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: SecretStore
  target:
    name: api-server-secrets
    creationPolicy: Owner
  data:
    - secretKey: database-url
      remoteRef:
        key: database-url-api
    - secretKey: credentials-encryption-key
      remoteRef:
        key: credentials-encryption-key
    # More0 / webhook pipeline secrets. Deployment references these with
    # `optional: true` so the app starts in `inproc` mode until they are
    # populated in Secret Manager.
    - secretKey: more0-api-key
      remoteRef:
        key: more0-api-key
    - secretKey: more0-tool-secret
      remoteRef:
        key: more0-tool-secret
    - secretKey: s3-access-key-id
      remoteRef:
        key: s3-access-key-id
    - secretKey: s3-secret-access-key
      remoteRef:
        key: s3-secret-access-key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: auth-server-secrets
  namespace: platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: SecretStore
  target:
    name: auth-server-secrets
    creationPolicy: Owner
  data:
    - secretKey: database-url
      remoteRef:
        key: database-url-auth
    - secretKey: jwt-secret
      remoteRef:
        key: auth-jwt-secret
    - secretKey: jwks-rsa-n
      remoteRef:
        key: auth-jwks-rsa-n
    - secretKey: jwks-rsa-d
      remoteRef:
        key: auth-jwks-rsa-d
    - secretKey: jwks-rsa-p
      remoteRef:
        key: auth-jwks-rsa-p
    - secretKey: jwks-rsa-q
      remoteRef:
        key: auth-jwks-rsa-q
    - secretKey: jwks-rsa-dp
      remoteRef:
        key: auth-jwks-rsa-dp
    - secretKey: jwks-rsa-dq
      remoteRef:
        key: auth-jwks-rsa-dq
    - secretKey: jwks-rsa-qi
      remoteRef:
        key: auth-jwks-rsa-qi
    - secretKey: jwks-ec-d
      remoteRef:
        key: auth-jwks-ec-d
    - secretKey: jwks-ec-x
      remoteRef:
        key: auth-jwks-ec-x
    - secretKey: jwks-ec-y
      remoteRef:
        key: auth-jwks-ec-y
    - secretKey: dcr-secret
      remoteRef:
        key: auth-dcr-secret
    - secretKey: dcr-iat-key
      remoteRef:
        key: auth-dcr-iat-key
    - secretKey: oidc-cookies-keys
      remoteRef:
        key: auth-oidc-cookies-keys
    - secretKey: oidc-client-secret
      remoteRef:
        key: auth-oidc-client-secret
    - secretKey: google-client-id
      remoteRef:
        key: auth-google-client-id
    - secretKey: google-client-secret
      remoteRef:
        key: auth-google-client-secret
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: frontend-secrets
  namespace: frontend
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: SecretStore
  target:
    name: frontend-secrets
    creationPolicy: Owner
  data:
    - secretKey: oidc-client-secret
      remoteRef:
        key: auth-oidc-client-secret
    - secretKey: oidc-cookie-secret
      remoteRef:
        key: frontend-oidc-cookie-secret
