# Claims Manager — Shared Infrastructure
#
# This project uses the SHARED infrastructure hosted in the capabilities repo.
# Do NOT define pgsql, redis, minio, nats, mailpit, or observability services here.
#
# Setup:
#   1. Start shared infra from capabilities:
#        cd ../capabilities/infra && docker compose up -d
#
#   2. (Optional) Start observability:
#        cd ../capabilities/infra && docker compose -f compose.observability.yaml up -d
#
#   3. Run init to create the claims_manager database and buckets (if not already done):
#        cd ../capabilities/infra && ./init.sh
#
#   4. Start claims-manager app services from this repo's root.
#
# Connection details (host):
#   DATABASE_URL=postgresql://more0ai:password@localhost:3210/claims_manager    (shared by auth-server + api)
#   REDIS_URL=redis://localhost:3250
#   S3_ENDPOINT=http://localhost:3230
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:3270
#
# Connection details (Docker, on more0ai-infra network):
#   DATABASE_URL=postgresql://more0ai:password@pgsql:5432/claims_manager       (shared by auth-server + api)
#   REDIS_URL=redis://redis:6379
#   S3_ENDPOINT=http://minio:9000
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
#
# See capabilities/infra/SHARED_INFRA.md for full documentation.
