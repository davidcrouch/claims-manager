apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-server
  namespace: platform
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: platform
  labels:
    app: api-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      serviceAccountName: api-server
      containers:
        - name: api-server
          image: australia-southeast1-docker.pkg.dev/claims-manager-infra-493807/claims-manager/api-server:IMAGE_TAG
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: api-server-secrets
                  key: database-url
            - name: CREDENTIALS_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: api-server-secrets
                  key: credentials-encryption-key
            - name: AUTH_ISSUER_URL
              value: https://auth.DNS_SUFFIX
            - name: AUTH_JWKS_URI
              value: https://auth.DNS_SUFFIX/jwks
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.infra.svc.cluster.local:4317
            # More0 integration (docs/implementation/31_MORE0_WEBHOOK_WORKFLOW_APP.md).
            # Defaults to the safe in-process pipeline; flip to `more0` once
            # the app is imported and the gateway is reachable.
            - name: WEBHOOK_PROCESSING_MODE
              value: inproc
            - name: MORE0_ENABLED
              value: "false"
            - name: MORE0_REGISTRY_URL
              value: http://more0-registry.infra.svc.cluster.local:3201
            - name: MORE0_GATEWAY_URL
              value: http://more0-gateway.infra.svc.cluster.local:3205
            - name: MORE0_APP_KEY
              value: claims-manager-webhook
            - name: MORE0_ORGANIZATION_ID
              value: claims-manager-webhook
            - name: MORE0_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-server-secrets
                  key: more0-api-key
                  optional: true
            - name: MORE0_TOOL_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-server-secrets
                  key: more0-tool-secret
                  optional: true
            # S3 archive for the payload-archive tool. The endpoint defaults
            # to GCS HMAC; override via overlay for MinIO/other providers.
            - name: S3_ENDPOINT
              value: https://storage.googleapis.com
            - name: S3_REGION
              value: australia-southeast1
            - name: S3_BUCKET_PAYLOADS
              value: claims-manager-webhooks
            - name: S3_FORCE_PATH_STYLE
              value: "false"
            - name: S3_ARCHIVE_PREFIX
              value: webhooks/payloads
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: api-server-secrets
                  key: s3-access-key-id
                  optional: true
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: api-server-secrets
                  key: s3-secret-access-key
                  optional: true
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api-server
  namespace: platform
  labels:
    app: api-server
spec:
  selector:
    app: api-server
  ports:
    - port: 3001
      targetPort: 3001
